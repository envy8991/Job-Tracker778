name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_unsigned_ipa:
    name: Build iOS unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode and project diagnostics
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -list -project "Job Tracker.xcodeproj"

      - name: Resolve Swift package dependencies
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project "Job Tracker.xcodeproj" \
            -scheme "Job Tracker"

      - name: Build app (no code signing)
        run: |
          set -euo pipefail
          xcodebuild clean build \
            -project "Job Tracker.xcodeproj" \
            -scheme "Job Tracker" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$PWD/build/Build/Products/Release-iphoneos/Job Tracker.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle missing at: $APP_PATH"
            echo "Found app bundles instead:"
            find "$PWD/build" -name "*.app" -type d -print || true
            exit 1
          fi

          rm -rf Payload JobTracker_Unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload JobTracker_Unsigned.ipa

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Job-Tracker-Unsigned-IPA
          path: JobTracker_Unsigned.ipa
          if-no-files-found: error
