name: Build Unsigned IPA for TrollStore

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild \
            -project "Job Tracker.xcodeproj" \
            -scheme "Job Tracker" \
            -resolvePackageDependencies

      - name: Build unsigned app
        run: |
          xcodebuild clean build \
            -project "Job Tracker.xcodeproj" \
            -scheme "Job Tracker" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build output"
            exit 1
          fi

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r "Job-Tracker-unsigned.ipa" Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Job-Tracker-unsigned-ipa
          path: Job-Tracker-unsigned.ipa
