name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Package Dependencies
        # This ensures any Swift Packages are downloaded before building
        run: xcodebuild -resolvePackageDependencies -project "Job Tracker.xcodeproj" -scheme "Job Tracker"

      - name: Build Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project "Job Tracker.xcodeproj" \
            -scheme "Job Tracker" \
            -configuration Release \
            -archivePath ./build/JobTracker.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          # The asterisk * helps if the .app name is slightly different than the scheme
          cp -r ./build/JobTracker.xcarchive/Products/Applications/*.app Payload/
          zip -r JobTracker_Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Job-Tracker-Unsigned
          path: JobTracker_Unsigned.ipa
