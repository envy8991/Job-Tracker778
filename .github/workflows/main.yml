name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    # Using macos-15 for a stable 2026 environment
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List Project Files (Debug)
        run: |
          echo "Listing all project files..."
          find . -maxdepth 2 -name "*.xcodeproj"
          echo "Listing available schemes..."
          xcodebuild -list

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project "Job Tracker.xcodeproj" -scheme "Job Tracker"

      - name: Build App Bundle (Unsigned)
        run: |
          xcodebuild build \
            -project "Job Tracker.xcodeproj" \
            -scheme "Job Tracker" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package into IPA
        run: |
          mkdir -p Payload
          # This find command is more robust than guessing the path
          APP_PATH=$(find ./build -name "*.app" -type d | head -n 1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r JobTracker_Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Job-Tracker-Unsigned-IPA
          path: JobTracker_Unsigned.ipa
