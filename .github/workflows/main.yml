name: "Build Unsigned IPA"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        # This automatically finds the latest stable Xcode on the runner
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project "Job Tracker.xcodeproj" \
            -scheme "Job Tracker" \
            -archivePath $RUNNER_TEMP/JobTracker.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create Payload Folder
        run: |
          mkdir -p Payload
          cp -r $RUNNER_TEMP/JobTracker.xcarchive/Products/Applications/*.app Payload/
          zip -r JobTracker_Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobTracker-Unsigned-IPA
          path: JobTracker_Unsigned.ipa
