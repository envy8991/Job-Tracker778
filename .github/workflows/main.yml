name: "Build Unsigned IPA"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      PROJECT_PATH: Job Tracker.xcodeproj
      SCHEME_NAME: Job Tracker
      ARCHIVE_PATH: $RUNNER_TEMP/JobTracker.xcarchive
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        # This automatically finds the latest stable Xcode on the runner
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: List Schemes (Diagnostics)
        run: xcodebuild -list -project "$PROJECT_PATH"

      - name: Build Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME_NAME" \
            -archivePath "$ARCHIVE_PATH" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create Payload Folder
        run: |
          mkdir -p Payload
          APP_PATH="$(find "$ARCHIVE_PATH/Products/Applications" -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app was found in archive output."
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r JobTracker_Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobTracker-Unsigned-IPA
          path: JobTracker_Unsigned.ipa
