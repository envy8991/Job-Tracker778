name: "Build Unsigned IPA"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      PROJECT_PATH: Job Tracker.xcodeproj
      TARGET_NAME: Job Tracker
      DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        # This automatically finds the latest stable Xcode on the runner
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build App (Unsigned)
        run: |
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -target "$TARGET_NAME" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create Payload Folder
        run: |
          mkdir -p Payload
          cp -r "$DERIVED_DATA_PATH/Build/Products/Release-iphoneos/"*.app Payload/
          zip -r JobTracker_Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobTracker-Unsigned-IPA
          path: JobTracker_Unsigned.ipa
