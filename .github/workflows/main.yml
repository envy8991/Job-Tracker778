name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project "Job Tracker.xcodeproj" \
            -scheme "Job Tracker" \
            -configuration Release \
            -archivePath ./build/JobTracker.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_METHOD=manual

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Copy the .app bundle from the archive into the Payload folder
          cp -r ./build/JobTracker.xcarchive/Products/Applications/*.app Payload/
          # Zip the Payload folder and rename it to .ipa
          zip -r JobTracker_Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Job-Tracker-Unsigned
          path: JobTracker_Unsigned.ipa
